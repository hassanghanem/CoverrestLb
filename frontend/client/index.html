<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpg" href="/assets/logo-black.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://coverrestlb.com/" />

    <!-- SEO Title -->
    <title>CoverrestLB - Phone Covers & Accessories in Lebanon</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="CoverrestLB offers high-quality phone covers, cases, and accessories in Lebanon. Protect your phone in style with our trendy and durable products."
    />

    <!-- Keywords (optional, not crucial but can help) -->
    <meta
      name="keywords"
      content="Coverrest, phone covers, phone cases, mobile accessories, Lebanon, Cover LB"
    />

    <!-- Open Graph for social sharing -->
    <meta
      property="og:title"
      content="CoverrestLB - Phone Covers & Accessories in Lebanon"
    />
    <meta
      property="og:description"
      content="CoverrestLB provides premium phone covers and accessories in Lebanon. Stylish, durable, and trendy options for all phone models."
    />
    <meta
      property="og:image"
      content="https://coverrestlb.com/assets/logo.jpg"
    />
    <meta property="og:url" content="https://coverrestlb.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="CoverrestLB - Phone Covers & Accessories in Lebanon"
    />
    <meta
      name="twitter:description"
      content="High-quality phone covers and accessories available at CoverrestLB. Stylish and durable options for all phones."
    />
    <meta
      name="twitter:image"
      content="https://coverrestlb.com/assets/logo.jpg"
    />

    <!-- Structured Data (JSON-LD) for better search results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "CoverrestLB",
        "image": "https://coverrestlb.com/assets/logo.jpg",
        "@id": "https://coverrestlb.com/",
        "url": "https://coverrestlb.com/",
        "telephone": "+96181761157",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Tyre",
          "addressLocality": "Tyre",
          "addressCountry": "LB"
        },
        "sameAs": [
          "https://www.instagram.com/coverrestlb"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
